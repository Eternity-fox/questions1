<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题库练习系统</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f4f7;
    font-family:"Microsoft YaHei",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:90%;
    max-width:1000px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.title{
    text-align:center;
    font-size:36px;
    margin-bottom:30px;
    color:#222;
    font-weight:bold;
}

.number{
    font-size:18px;
    color:#666;
    margin-bottom:20px;
}

.question{
    font-size:28px;
    line-height:1.8;
    color:#111;
    margin-bottom:30px;
}

.option{
    background:#f7f7f7;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:20px;
    transition:0.2s;
}

.option:hover{
    background:#e3f2fd;
}

.answer-box{
    display:none;
    margin-top:25px;
    background:#e8f5e9;
    padding:20px;
    border-radius:12px;
    color:#1b5e20;
    font-size:20px;
    line-height:1.8;
}

.analysis-box{
    display:none;
    margin-top:20px;
    background:#fff8e1;
    padding:20px;
    border-radius:12px;
    color:#e65100;
    font-size:17px;
    line-height:1.8;
    overflow:auto;
}

.analysis-box pre{
    white-space:pre-wrap;
    word-break:break-word;
    font-family:"Microsoft YaHei",monospace;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:35px;
    flex-wrap:wrap;
}

button{
    flex:1;
    min-width:140px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#1976d2;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1257a6;
}

.loading{
    text-align:center;
    font-size:24px;
    color:#666;
}

.error{
    text-align:center;
    color:red;
    font-size:22px;
}

@media(max-width:768px){

    .container{
        padding:25px;
    }

    .question{
        font-size:22px;
    }

    .option{
        font-size:18px;
    }

    button{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        题库练习系统
    </div>

    <div id="content">

        <div class="loading">
            正在加载题库...
        </div>

    </div>

</div>

<script>

let questions = [];
let current = 0;

async function loadQuestions(){

    try{

        const response = await fetch("questions.txt");

        if(!response.ok){

            throw new Error("读取失败");

        }

        const text = await response.text();

        parseQuestions(text);

        if(questions.length === 0){

            document.getElementById("content").innerHTML = `
                <div class="error">
                    未检测到题目
                </div>
            `;

            return;
        }

        showQuestion();

    }catch(err){

        document.getElementById("content").innerHTML = `
            <div class="error">
                无法读取 questions.txt 文件
                <br><br>
                请确保：
                <br>
                1. questions.txt 与 html 在同目录
                <br>
                2. 使用本地服务器打开
            </div>
        `;

        console.error(err);

    }

}

function parseQuestions(text){

    questions = [];

    const rawQuestions =
        text.split(/(?=题目：)/g);

    rawQuestions.forEach(block => {

        block = block.trim();

        if(!block) return;

        const obj = {
            question:"",
            A:"",
            B:"",
            C:"",
            D:"",
            answer:"",
            analysis:""
        };

        const lines = block.split("\n");

        let isAnalysis = false;

        lines.forEach(line => {

            line = line.trim();

            if(line.startsWith("题目：")){

                obj.question =
                    line.replace("题目：","");

                isAnalysis = false;

            }

            else if(line.startsWith("选项A：")){

                obj.A =
                    line.replace("选项A：","");

                isAnalysis = false;

            }

            else if(line.startsWith("选项B：")){

                obj.B =
                    line.replace("选项B：","");

                isAnalysis = false;

            }

            else if(line.startsWith("选项C：")){

                obj.C =
                    line.replace("选项C：","");

                isAnalysis = false;

            }

            else if(line.startsWith("选项D：")){

                obj.D =
                    line.replace("选项D：","");

                isAnalysis = false;

            }

            else if(line.startsWith("答案：")){

                obj.answer =
                    line.replace("答案：","");

                isAnalysis = false;

            }

            else if(line.startsWith("解析：")){

                obj.analysis =
                    line.replace("解析：","");

                isAnalysis = true;

            }

            else if(isAnalysis){

                obj.analysis += "\n" + line;

            }

        });

        if(obj.question){

            questions.push(obj);

        }

    });

}

function showQuestion(){

    const q = questions[current];

    document.getElementById("content").innerHTML = `

        <div class="number">
            第 ${current + 1} / ${questions.length} 题
        </div>

        <div class="question">
            ${q.question}
        </div>

        <div class="option">
            A. ${q.A}
        </div>

        <div class="option">
            B. ${q.B}
        </div>

        <div class="option">
            C. ${q.C}
        </div>

        <div class="option">
            D. ${q.D}
        </div>

        <div class="answer-box" id="answerBox">
            正确答案：${q.answer}
        </div>

        <div class="analysis-box" id="analysisBox">
            <pre>${q.analysis}</pre>
        </div>

        <div class="buttons">

            <button onclick="prevQuestion()">
                上一题
            </button>

            <button onclick="toggleAnswer()">
                查看答案
            </button>

            <button onclick="toggleAnalysis()">
                查看解析
            </button>

            <button onclick="nextQuestion()">
                下一题
            </button>

        </div>

    `;

}

function nextQuestion(){

    if(current < questions.length - 1){

        current++;

        showQuestion();

    }

}

function prevQuestion(){

    if(current > 0){

        current--;

        showQuestion();

    }

}

function toggleAnswer(){

    const box =
        document.getElementById("answerBox");

    if(box.style.display === "block"){

        box.style.display = "none";

    }else{

        box.styledisplay = "block";
        box.style.display = "block";

    }

}

function toggleAnalysis(){

    const box =
        document.getElementById("analysisBox");

    if(box.style.display === "block"){

        box.style.display = "none";

    }else{

        box.style.display = "block";

    }

}

loadQuestions();

</script>

</body>
</html>
