<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>题库练习系统 · 带目录跳转</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f2f4f7;
      font-family: "Microsoft YaHei", "苹方", "PingFang SC", "Helvetica Neue", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      background: white;
      border-radius: 28px;
      padding: 35px 40px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .title {
      text-align: center;
      font-size: 36px;
      margin-bottom: 25px;
      color: #1e293b;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* 目录按钮 */
    .catalog-btn {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 40px;
      padding: 10px 24px;
      font-size: 18px;
      font-weight: 500;
      color: #1f2937;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      margin-left: 15px;
    }

    .catalog-btn:hover {
      background: #eef2ff;
      border-color: #6366f1;
      color: #4338ca;
      box-shadow: 0 6px 14px rgba(99, 102, 241, 0.2);
    }

    .number {
      font-size: 18px;
      color: #4b5563;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .question {
      font-size: 28px;
      line-height: 1.7;
      color: #0f172a;
      margin-bottom: 28px;
      font-weight: 500;
    }

    .option {
      background: #f8fafc;
      padding: 18px 20px;
      border-radius: 16px;
      margin-bottom: 14px;
      font-size: 20px;
      transition: 0.2s;
      border: 1px solid #e9eef2;
      color: #1e293b;
    }

    .option:hover {
      background: #eef2ff;
      border-color: #a5b4fc;
    }

    .answer-box {
      display: none;
      margin-top: 25px;
      background: #e8f5e9;
      padding: 20px 22px;
      border-radius: 16px;
      color: #1b5e20;
      font-size: 20px;
      line-height: 1.8;
      border-left: 5px solid #2e7d32;
    }

    .analysis-box {
      display: none;
      margin-top: 18px;
      background: #fff8e1;
      padding: 20px 22px;
      border-radius: 16px;
      color: #b45309;
      font-size: 17px;
      line-height: 1.8;
      overflow: auto;
      border-left: 5px solid #d97706;
    }

    .analysis-box pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Microsoft YaHei", "PingFang SC", monospace;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-top: 35px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 130px;
      padding: 16px 12px;
      border: none;
      border-radius: 14px;
      background: #1976d2;
      color: white;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(25, 118, 210, 0.25);
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #1257a6;
      box-shadow: 0 8px 16px rgba(18, 87, 166, 0.3);
    }

    /* 目录弹窗样式 */
    .catalog-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(3px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .catalog-panel {
      background: white;
      border-radius: 28px;
      max-width: 500px;
      width: 85%;
      max-height: 70vh;
      padding: 28px 24px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .catalog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: 600;
      color: #111827;
    }

    .close-catalog {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #6b7280;
      line-height: 1;
      padding: 0 8px;
      box-shadow: none;
      background: transparent;
      min-width: auto;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-catalog:hover {
      background: #f3f4f6;
      color: #1f2937;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 12px;
      overflow-y: auto;
      padding: 5px 5px 15px 5px;
    }

    .catalog-item {
      background: #f1f5f9;
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e2e8f0;
    }

    .catalog-item:hover {
      background: #dbeafe;
      border-color: #3b82f6;
      color: #1e40af;
      transform: translateY(-2px);
      box-shadow: 0 8px 14px rgba(59,130,246,0.2);
    }

    .catalog-item.current {
      background: #1976d2;
      color: white;
      border-color: #0f5ca8;
      font-weight: 600;
      box-shadow: 0 6px 12px rgba(25,118,210,0.4);
    }

    .loading, .error {
      text-align: center;
      font-size: 22px;
      color: #4b5563;
      padding: 30px;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 768px) {
      .container {
        padding: 25px 20px;
      }
      .question {
        font-size: 22px;
      }
      .option {
        font-size: 18px;
      }
      button {
        font-size: 16px;
        min-width: 110px;
      }
      .catalog-btn {
        padding: 8px 18px;
        font-size: 16px;
        margin-left: 8px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="title">
    <span>📘 题库练习系统</span>
    <button class="catalog-btn" id="openCatalogBtn">
      📋 目录
    </button>
  </div>

  <div id="content">
    <div class="loading">正在加载题库...</div>
  </div>
</div>

<!-- 目录弹窗（覆盖层） -->
<div class="catalog-overlay" id="catalogOverlay">
  <div class="catalog-panel">
    <div class="catalog-header">
      <span>📑 选择题目</span>
      <button class="close-catalog" id="closeCatalogBtn">&times;</button>
    </div>
    <div class="catalog-grid" id="catalogGrid"></div>
  </div>
</div>

<script>
  let questions = [];
  let current = 0;

  // 加载题目
  async function loadQuestions() {
    try {
      const response = await fetch("questions.txt");
      if (!response.ok) {
        throw new Error("读取失败");
      }
      const text = await response.text();
      parseQuestions(text);

      if (questions.length === 0) {
        document.getElementById("content").innerHTML = `<div class="error">未检测到题目</div>`;
        return;
      }
      showQuestion();
    } catch (err) {
      document.getElementById("content").innerHTML = `
        <div class="error">
          无法读取 questions.txt 文件<br><br>
          请确保：<br>
          1. questions.txt 与 html 在同目录<br>
          2. 使用本地服务器打开
        </div>`;
      console.error(err);
    }
  }

  function parseQuestions(text) {
    questions = [];
    const rawQuestions = text.split(/(?=题目：)/g);

    rawQuestions.forEach(block => {
      block = block.trim();
      if (!block) return;

      const obj = {
        question: "",
        A: "",
        B: "",
        C: "",
        D: "",
        answer: "",
        analysis: ""
      };

      const lines = block.split("\n");
      let isAnalysis = false;

      lines.forEach(line => {
        line = line.trim();

        if (line.startsWith("题目：")) {
          obj.question = line.replace("题目：", "");
          isAnalysis = false;
        } else if (line.startsWith("选项A：")) {
          obj.A = line.replace("选项A：", "");
          isAnalysis = false;
        } else if (line.startsWith("选项B：")) {
          obj.B = line.replace("选项B：", "");
          isAnalysis = false;
        } else if (line.startsWith("选项C：")) {
          obj.C = line.replace("选项C：", "");
          isAnalysis = false;
        } else if (line.startsWith("选项D：")) {
          obj.D = line.replace("选项D：", "");
          isAnalysis = false;
        } else if (line.startsWith("答案：")) {
          obj.answer = line.replace("答案：", "");
          isAnalysis = false;
        } else if (line.startsWith("解析：")) {
          obj.analysis = line.replace("解析：", "");
          isAnalysis = true;
        } else if (isAnalysis) {
          obj.analysis += "\n" + line;
        }
      });

      if (obj.question) {
        questions.push(obj);
      }
    });
  }

  // 渲染当前题目
  function showQuestion() {
    if (!questions.length) return;
    const q = questions[current];

    document.getElementById("content").innerHTML = `
      <div class="number">
        <span>第 ${current + 1} / ${questions.length} 题</span>
      </div>
      <div class="question">${q.question}</div>
      <div class="option">A. ${q.A}</div>
      <div class="option">B. ${q.B}</div>
      <div class="option">C. ${q.C}</div>
      <div class="option">D. ${q.D}</div>
      <div class="answer-box" id="answerBox">正确答案：${q.answer}</div>
      <div class="analysis-box" id="analysisBox"><pre>${q.analysis}</pre></div>
      <div class="buttons">
        <button onclick="prevQuestion()">◀ 上一题</button>
        <button onclick="toggleAnswer()">🔍 查看答案</button>
        <button onclick="toggleAnalysis()">📖 查看解析</button>
        <button onclick="nextQuestion()">下一题 ▶</button>
      </div>
    `;
  }

  function nextQuestion() {
    if (current < questions.length - 1) {
      current++;
      showQuestion();
    }
  }

  function prevQuestion() {
    if (current > 0) {
      current--;
      showQuestion();
    }
  }

  function toggleAnswer() {
    const box = document.getElementById("answerBox");
    if (box) {
      box.style.display = (box.style.display === "block") ? "none" : "block";
    }
  }

  function toggleAnalysis() {
    const box = document.getElementById("analysisBox");
    if (box) {
      box.style.display = (box.style.display === "block") ? "none" : "block";
    }
  }

  // ----- 目录功能 -----
  const overlay = document.getElementById("catalogOverlay");
  const openBtn = document.getElementById("openCatalogBtn");
  const closeBtn = document.getElementById("closeCatalogBtn");
  const catalogGrid = document.getElementById("catalogGrid");

  // 打开目录并渲染题号列表
  function openCatalog() {
    if (!questions.length) {
      alert("题库暂无题目");
      return;
    }
    renderCatalogItems();
    overlay.style.display = "flex";
  }

  // 关闭目录
  function closeCatalog() {
    overlay.style.display = "none";
  }

  // 根据当前题目索引渲染目录项，并标记当前题目
  function renderCatalogItems() {
    if (!catalogGrid) return;
    let html = "";
    for (let i = 0; i < questions.length; i++) {
      const num = i + 1;
      const isCurrent = (i === current) ? "current" : "";
      html += `<div class="catalog-item ${isCurrent}" data-index="${i}">${num}</div>`;
    }
    catalogGrid.innerHTML = html;

    // 给每个目录项绑定点击跳转事件
    document.querySelectorAll(".catalog-item").forEach(item => {
      item.addEventListener("click", function(e) {
        const index = parseInt(this.getAttribute("data-index"), 10);
        if (!isNaN(index) && index >= 0 && index < questions.length) {
          current = index;
          showQuestion();
          closeCatalog();
        }
      });
    });
  }

  // 绑定打开/关闭事件
  openBtn.addEventListener("click", openCatalog);
  closeBtn.addEventListener("click", closeCatalog);
  overlay.addEventListener("click", function(e) {
    // 点击遮罩层外部关闭（只有点击 overlay 本身才关闭）
    if (e.target === overlay) {
      closeCatalog();
    }
  });

  // 键盘ESC关闭目录
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && overlay.style.display === "flex") {
      closeCatalog();
    }
  });

  // 启动加载
  loadQuestions();
</script>

</body>
</html>
